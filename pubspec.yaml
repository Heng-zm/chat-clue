name: bluetooth_chat
description: Encrypted Bluetooth Chat — cross-platform (Android, iOS, macOS, Windows, Linux)
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Bluetooth ─────────────────────────────────────────────────────────
  # Classic SPP — Android only (iOS restricts BT Classic via MFi)
  flutter_bluetooth_serial: ^0.4.0

  # BLE — Android 5+, iOS 9+, macOS 10.13+, Windows 10+, Linux (BlueZ)
  flutter_blue_plus: ^1.32.12

  # ── Permissions ───────────────────────────────────────────────────────
  permission_handler: ^11.3.1          # mobile + desktop (no-op on web)

  # ── Encryption ────────────────────────────────────────────────────────
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # ── State ─────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Persistence ───────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── UI helpers ────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # ── Utils ─────────────────────────────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/
