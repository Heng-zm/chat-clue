name: Desktop-Build-Workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: bluetooth_chat_windows.zip

          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: bluetooth_chat_macos.zip

          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: bluetooth_chat_linux.tar.gz

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # Linux dependencies
      # ---------------------------
      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ---------------------------
      # Windows FIX (CMake + MSVC)
      # ---------------------------
      - name: Setup MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---------------------------
      # Flutter Setup
      # ---------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      # ---------------------------
      # CLEAN FIX (IMPORTANT FOR YOUR ERROR)
      # ---------------------------
      - name: Clean Flutter project
        run: flutter clean

      - name: Get Dependencies
        run: flutter pub get

      # 🔥 FIX: correct Windows plugin generation
      - name: Regenerate Windows platform
        run: flutter create --platforms=windows .

      - name: Precache Windows tools
        run: flutter precache --windows

      # ---------------------------
      # Enable desktop
      # ---------------------------
      - name: Enable Desktop Support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      # ---------------------------
      # BUILD
      # ---------------------------
      - name: Build App
        run: flutter build ${{ matrix.platform }} --release

      # ---------------------------
      # DEBUG OUTPUT (VERY IMPORTANT)
      # ---------------------------
      - name: Show build output
        run: |
          echo "Build directory structure:"
          ls -R build || dir build

      # ---------------------------
      # PACKAGE
      # ---------------------------
      - name: Package Windows
        if: matrix.platform == 'windows'
        run: powershell Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "${{ matrix.archive }}"

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app ${{ matrix.archive }}

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: tar -czvf ${{ matrix.archive }} -C build/linux/x64/release/bundle .

      # ---------------------------
      # Upload artifact
      # ---------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  # ---------------------------
  # SINGLE RELEASE JOB (FIXES RACE + ERRORS)
  # ---------------------------
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Desktop Build v1.0.${{ github.run_number }}"
          body: "Automated build (Run #${{ github.run_number }})"
          files: artifacts/**/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
