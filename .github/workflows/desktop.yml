name: Desktop-Build-Workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: bluetooth_chat_windows.zip

          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: bluetooth_chat_macos.zip

          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: bluetooth_chat_linux.tar.gz

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Linux dependencies ---
      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # --- Flutter ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Desktop Support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Ensure Platform Folders Exist
        run: flutter create --platforms=windows,macos,linux .

      - name: Build App
        run: flutter build ${{ matrix.platform }} --release

      # --- Packaging ---
      - name: Package Windows
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path ${{ matrix.output }}/* -DestinationPath ${{ matrix.archive }}

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent ${{ matrix.output }}/*.app ${{ matrix.archive }}

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: tar -czvf ${{ matrix.archive }} -C ${{ matrix.output }} .

      # --- Upload artifact ---
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show files (debug)
        run: ls -R artifacts

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Bluetooth Chat Desktop v1.0.${{ github.run_number }}"
          body: "Automated release (Run #${{ github.run_number }})"
          files: artifacts/**/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
