name: Desktop-Build-Fixed

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: windows_build.zip

          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: linux_build.tar.gz

          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: macos_build.zip

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # Flutter Setup (FIXED CACHE ISSUE)
      # ---------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # ---------------------------
      # 🔥 FIX: Flutter SDK + 404 issue
      # ---------------------------
      - name: Fix Flutter SDK + cache
        run: |
          flutter channel stable
          flutter upgrade
          flutter precache --force

      # ---------------------------
      # Enable all desktop platforms
      # ---------------------------
      - name: Enable desktop support
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop

      # ---------------------------
      # Install dependencies
      # ---------------------------
      - name: Install dependencies
        run: flutter pub get

      # ---------------------------
      # 🔥 CRITICAL FIX: regenerate platform projects correctly
      # ---------------------------
      - name: Generate platform projects
        run: flutter create --platforms=windows,linux,macos .

      # ---------------------------
      # CLEAN (fix plugin symlinks)
      # ---------------------------
      - name: Clean Flutter
        run: flutter clean

      - name: Get packages again
        run: flutter pub get

      # ---------------------------
      # WINDOWS FIX (MSVC required)
      # ---------------------------
      - name: Setup MSVC (Windows only)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---------------------------
      # LINUX DEPENDENCIES
      # ---------------------------
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # ---------------------------
      # 🔥 FIX: plugin system corruption
      # ---------------------------
      - name: Fix Flutter plugin system
        run: flutter precache --force

      # ---------------------------
      # BUILD
      # ---------------------------
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      # ---------------------------
      # DEBUG OUTPUT (important)
      # ---------------------------
      - name: Show build output
        run: |
          echo "Build output:"
          ls -R build || dir build

      # ---------------------------
      # PACKAGE
      # ---------------------------
      - name: Package Windows
        if: matrix.platform == 'windows'
        run: powershell Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "${{ matrix.archive }}"

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: tar -czvf ${{ matrix.archive }} -C build/linux/x64/release/bundle .

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app ${{ matrix.archive }}

      # ---------------------------
      # Upload artifacts
      # ---------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  # ---------------------------
  # SINGLE RELEASE (FIXES ALL CONFLICTS)
  # ---------------------------
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Desktop Build v1.0.${{ github.run_number }}"
          body: "Automated build (Run #${{ github.run_number }})"
          files: artifacts/**/*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
