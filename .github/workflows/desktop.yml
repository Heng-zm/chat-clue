name: Desktop-Build-Fixed

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: windows_build.zip
          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: linux_build.tar.gz
          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: macos_build.zip

    steps:
      # 1. Setup Git to handle symlinks BEFORE checking out
      - name: Enable Symlinks in Git
        run: git config --global core.symlinks true
        shell: pwsh

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 2. Windows Specific: Enable Developer Mode & Prep
      - name: Windows Environment Setup
        if: matrix.platform == 'windows'
        run: |
          # Enable Developer Mode (Allows symlinks without Admin)
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f
          
          # Force delete the broken "ephemeral" folder and cached CMake files
          if (Test-Path windows/flutter/ephemeral) { Remove-Item -Recurse -Force windows/flutter/ephemeral }
          if (Test-Path windows/flutter/generated_plugins.cmake) { Remove-Item -Force windows/flutter/generated_plugins.cmake }
        shell: pwsh

      - name: Setup MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # 3. Enable Platforms
      - name: Enable desktop support
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop

      # 4. Linux Dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # 5. 🔥 REBUILD PROJECT STRUCTURE
      - name: Repair and Generate Platform Files
        run: |
          flutter create --platforms=windows,linux,macos .
          flutter pub get
          flutter precache --force

      # 6. Build
      - name: Build Project
        run: |
          if ("${{ matrix.platform }}" -eq "windows") { flutter build windows --release }
          elseif ("${{ matrix.platform }}" -eq "linux") { flutter build linux --release }
          elseif ("${{ matrix.platform }}" -eq "macos") { flutter build macos --release }
        shell: pwsh

      # 7. Package and Upload
      - name: Package Artifacts
        run: |
          if ("${{ matrix.platform }}" -eq "windows") {
            Compress-Archive -Path "${{ matrix.output }}/*" -DestinationPath "${{ matrix.archive }}"
          } elseif ("${{ matrix.platform }}" -eq "linux") {
            tar -czvf ${{ matrix.archive }} -C ${{ matrix.output }} .
          } elseif ("${{ matrix.platform }}" -eq "macos") {
            ditto -c -k --sequesterRsrc --keepParent ${{ matrix.output }}/*.app ${{ matrix.archive }}
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Desktop Build v1.0.${{ github.run_number }}"
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
