name: Desktop-Build-Fixed

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: windows_build.zip

          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: linux_build.tar.gz

          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: macos_build.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 2. Enable Desktop Support (Must happen before pub get)
      - name: Enable desktop support
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop

      # 3. Windows Specific Fixes (Symlinks & MSVC)
      - name: Windows Symlink & MSVC Setup
        if: matrix.platform == 'windows'
        run: |
          git config --global core.symlinks true
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f
        shell: pwsh

      - name: Setup MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # 4. Linux Specific Dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # 5. Prepare Project (Re-generate and Get Packages)
      - name: Generate platform projects
        run: flutter create --platforms=windows,linux,macos .

      - name: Install dependencies
        run: flutter pub get

      - name: Precache Binaries
        run: flutter precache --force

      # 6. Build
      - name: Build Project
        run: |
          if ("${{ matrix.platform }}" -eq "windows") { flutter build windows --release }
          if ("${{ matrix.platform }}" -eq "linux") { flutter build linux --release }
          if ("${{ matrix.platform }}" -eq "macos") { flutter build macos --release }
        shell: pwsh

      # 7. Package Artifacts
      - name: Package Windows
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path "${{ matrix.output }}/*" -DestinationPath "${{ matrix.archive }}"
        shell: pwsh

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: tar -czvf ${{ matrix.archive }} -C ${{ matrix.output }} .

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent ${{ matrix.output }}/*.app ${{ matrix.archive }}

      # 8. Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Desktop Build v1.0.${{ github.run_number }}"
          body: "Automated desktop build for Windows, Linux, and macOS."
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
