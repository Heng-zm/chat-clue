name: Desktop-Build-Fixed

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: windows_build.zip
          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: linux_build.tar.gz
          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: macos_build.zip

    steps:
      # Step 1: Force Git and Windows to allow Symlinks and Long Paths
      - name: Windows OS Prep
        if: matrix.platform == 'windows'
        run: |
          git config --global core.symlinks true
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f
        shell: powershell

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable desktop support
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      # Step 2: Nuclear Cleanup and Re-link
      - name: Repair Project Structure
        run: |
          # If windows folder exists, clean ephemeral links that break on CI
          if (Test-Path windows/flutter/ephemeral) { Remove-Item -Recurse -Force windows/flutter/ephemeral }
          flutter create --platforms=windows,linux,macos .
          flutter pub get
          flutter precache --force
        shell: pwsh

      # Step 3: Platform Specific Build
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      # Step 4: Packaging
      - name: Package Artifacts
        run: |
          if ("${{ matrix.platform }}" -eq "windows") {
            Compress-Archive -Path "${{ matrix.output }}/*" -DestinationPath "${{ matrix.archive }}"
          } elseif ("${{ matrix.platform }}" -eq "linux") {
            tar -czvf ${{ matrix.archive }} -C ${{ matrix.output }} .
          } elseif ("${{ matrix.platform }}" -eq "macos") {
            ditto -c -k --sequesterRsrc --keepParent ${{ matrix.output }}/*.app ${{ matrix.archive }}
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}

  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Desktop Build v1.0.${{ github.run_number }}"
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
