name: Desktop-Build-Workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: 🚀 Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release
            archive: bluetooth_chat_windows.zip
          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release
            archive: bluetooth_chat_macos.zip
          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle
            archive: bluetooth_chat_linux.tar.gz

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Linux Native Dependencies ---
      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Desktop Support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Ensure Platform Folders Exist
        # This prevents the "No Windows project configured" error
        run: flutter create --platforms=windows,macos,linux .

      - name: Build Desktop App
        run: flutter build ${{ matrix.platform }} --release

      # --- Packaging Logic (Fixes the flutter_windows.dll error) ---
      
      - name: Package Windows Build
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path ${{ matrix.output }}/* -DestinationPath ${{ matrix.archive }}

      - name: Package macOS Build
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent ${{ matrix.output }}/*.app ${{ matrix.archive }}

      - name: Package Linux Build
        if: matrix.platform == 'linux'
        run: tar -czvf ${{ matrix.archive }} -C ${{ matrix.output }} .

      # --- Artifact & Release Management ---

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.archive }}

      - name: Release to GitHub
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.archive }}
          tag: v1.0.${{ github.run_number }}
          overwrite: true
          body: "Bluetooth Chat Desktop - Automated Release (Run #${{ github.run_number }})"
