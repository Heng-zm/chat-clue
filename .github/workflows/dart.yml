name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🍎 Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Flutter সেটअप ---
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- CocoaPods ---
      - name: Setup CocoaPods
        run: |
          cd ios
          pod install
          pod repo update

      # --- Build بدون codesign ---
      - name: Build iOS app (no codesign)
        run: flutter build ios --release --no-codesign

      # --- Create IPA ---
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r FlutterIpaExport.ipa Payload

      # --- Upload artifact (backup) ---
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa

      # --- Release (fixed) ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "iOS Build v1.0.${{ github.run_number }}"
          body: "Automated iOS IPA build (Run #${{ github.run_number }})"
          files: build/ios/iphoneos/FlutterIpaExport.ipa

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
